<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR League Master Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap');
:root {
  --bg:#1e2530; --surface:#ffffff; --surface2:#e8ecf0;
  --border:#c0cad4; --border2:#a8b4c0; --text:#1a2332; --muted:#5a6a7a;
  --accent:#0066cc;
  --arc:#4472C4; --cal:#ED7D31; --cl:#70AD47;
  --cclass:#9B59B6; --ffc:#E74C3C; --genx:#F39C12;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Exo 2',sans-serif; min-height:100vh; }
body::before { content:''; position:fixed; inset:0;
  background-image: linear-gradient(rgba(0,102,204,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,102,204,.03) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none; z-index:0; }
.app { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:0 20px 60px; }

header { padding:24px 0 20px; border-bottom:2px solid var(--border); display:flex; align-items:center; gap:16px; flex-wrap:wrap; background:var(--surface); padding-left:20px; padding-right:20px; margin:0 -20px; }
.logo-img { display:flex; align-items:center; flex-shrink:0; }
.header-text p { font-size:11px; color:var(--muted); font-family:'Share Tech Mono',monospace; letter-spacing:1px; margin-top:2px; }
.status-pill { margin-left:auto; padding:6px 14px; border-radius:20px; font-size:11px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; }
.status-pill.connected { background:rgba(112,173,71,.12); border:1px solid #4a9a2a; color:#2d7a0f; }
.status-pill.disconnected { background:rgba(231,76,60,.12); border:1px solid #c0392b; color:#a93226; }
.status-pill.loading { background:rgba(0,102,204,.1); border:1px solid var(--accent); color:var(--accent); }

.league-filters { display:flex; gap:8px; padding:14px 0 6px; flex-wrap:wrap; align-items:center; }
.filter-label { font-size:11px; color:rgba(255,255,255,.6); font-family:'Share Tech Mono',monospace; }
.filter-btn { padding:5px 14px; border-radius:20px; font-size:11px; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px;
  border:2px solid transparent; color:#fff; text-transform:uppercase;
  opacity:.45; transition:opacity .15s,transform .1s; }
.filter-btn.on { opacity:1; }
.filter-btn:hover { transform:scale(1.05); }
.filter-all { background:var(--surface2); border-color:var(--border2); color:var(--muted); }
.filter-all.on { color:var(--text); border-color:var(--accent); }

.cal-controls { display:flex; align-items:center; gap:12px; padding:16px 0 14px; flex-wrap:wrap; }
.cal-nav { display:flex; align-items:center; gap:8px; }
.nav-btn { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#ffffff;
  border-radius:6px; width:34px; height:34px; cursor:pointer; font-size:18px;
  transition:all .15s; display:flex; align-items:center; justify-content:center; }
.nav-btn:hover { background:rgba(255,255,255,.25); border-color:#ffffff; color:#ffffff; }
.cal-title { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; min-width:280px; text-align:center; color:#ffffff; }
.view-toggle { margin-left:auto; display:flex; gap:6px; }
.view-btn { padding:7px 18px; border-radius:6px; font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer; border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.1); color:#ffffff; transition:all .2s;
  text-transform:uppercase; letter-spacing:1px; }
.view-btn.active { background:rgba(255,255,255,.25); border-color:#ffffff; color:#ffffff; font-weight:800; }

.overlap-banner { background:rgba(220,53,53,.12); border:2px solid rgba(220,53,53,.7);
  border-radius:8px; padding:12px 18px; margin-bottom:14px;
  font-size:13px; color:#c0392b; font-family:'Share Tech Mono',monospace; font-weight:600;
  display:none; line-height:1.6; }
.overlap-banner.visible { display:block; }
.overlap-banner strong { font-family:'Rajdhani',sans-serif; font-size:17px; letter-spacing:2px; display:block; margin-bottom:6px; color:#e74c3c; }

/* Month */
.month-grid { display:none; }
.month-grid.visible { display:block; }
.dow-headers { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:2px; }
.dow-header { text-align:center; padding:8px; font-size:11px; font-family:'Share Tech Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.days-grid-cal { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.day-cell { background:var(--surface); border:1px solid var(--border); border-radius:8px; min-height:105px; padding:8px; position:relative; cursor:pointer; transition:border-color .15s; }
.day-cell:hover { border-color:var(--border2); }
.day-cell.other-month { opacity:.3; }
.day-cell.today { border-color:var(--accent); }
.day-num { font-size:13px; font-weight:600; color:var(--muted); font-family:'Share Tech Mono',monospace; margin-bottom:5px; }
.day-cell.today .day-num { color:var(--accent); }
.event-chip { border-radius:4px; padding:3px 7px; margin-bottom:3px; font-size:10px;
  font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:.5px;
  color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:4px; }
.conflict-dot { position:absolute; top:6px; right:6px; width:14px; height:14px;
  border-radius:50%; background:#e74c3c; box-shadow:0 0 8px rgba(231,76,60,.7); border:2px solid #fff;
  display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; font-weight:700; }

/* Week + Day shared table */
.week-grid, .day-grid { display:none; overflow-x:auto; }
.week-grid.visible, .day-grid.visible { display:block; }
.week-table { width:100%; border-collapse:collapse; min-width:500px; }
.week-table th { background:var(--surface2); padding:10px 8px; text-align:center;
  font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; border:1px solid var(--border); color:var(--muted); }
.week-table th.today-col { color:var(--accent); border-color:var(--accent); }
.week-table td { border:1px solid var(--border); padding:4px 6px; vertical-align:top;
  background:var(--surface); min-width:90px; }
  .week-table tr:hover td { background:#f8fafc; }
.week-table .time-col { width:72px; text-align:right; padding-right:10px;
  font-size:10px; font-family:'Share Tech Mono',monospace; color:var(--muted);
  background:var(--surface2); white-space:nowrap; min-width:0; }
.week-conflict-cell { background:rgba(255,180,0,.12) !important; }
.half-hour { opacity:.55; }

.state-box { text-align:center; padding:60px 20px; color:var(--muted);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  border:1px dashed var(--border2); border-radius:12px; line-height:2; background:var(--surface); }
.refresh-btn { padding:7px 16px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.3);
  color:#ffffff; border-radius:6px; cursor:pointer; font-size:12px;
  font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; transition:all .2s; }
.refresh-btn:hover { background:rgba(255,255,255,.2); }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
@media(max-width:600px){ .day-cell{min-height:70px;} .cal-title{min-width:160px;font-size:16px;} }
</style>
</head>

<script>
const LEAGUE_COLORS = {
  ARC:'#4472C4', CAL:'#ED7D31', CL:'#70AD47',
  CClass:'#9B59B6', FFC:'#E74C3C', GenX:'#F39C12'
};
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_S   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_L   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqAtKajut-UFC0ufPvoSD0D3o0rmzuX0j2Vi9sdf_4Y5E_y6iVi-J0Bvm8U0aHzRkyLA/exec";
const SHEET_ID  = "1x0XCVGKv1MUFYSMoBs-irciI9pO7YovYLprZccNVDL0";
const SHEET_TAB = "Schedule Data";

let comps = [];
let calDate = new Date();
let calView = 'month';
let activeFilters = new Set(['ARC','CAL','CL','CClass','FFC','GenX']);
let refreshTimer = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchData() {
  setStatus('loading','LOADING...');
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    comps = parseAppsScript(json);
    setStatus('connected', `LIVE · ${comps.length} COMPS · ${new Date().toLocaleTimeString()}`);
    // DEBUG — log first comp to console
    if (comps.length > 0) {
      console.log('Sample comp:', JSON.stringify(comps[0]));
      console.log('tStart raw:', comps[0].tStart, '→ parsed mins:', parseTime(comps[0].tStart));
      console.log('days:', comps[0].days);
      // Check what today matches
      const today = new Date();
      console.log('Events today:', getEventsForDate(today).length);
    }
    console.log('Raw first row from sheet:', JSON.stringify(json[0]));
    renderCalendar();
  } catch(e) {
    setStatus('disconnected', `FAILED — ${e.message}`);
    console.error(e);
  }
}

function refreshData() { fetchData(); }

// ── Parse Apps Script JSON ────────────────────────────────────────────────────
function parseAppsScript(rows) {
  const result = [];
  for (const r of rows) {
    const league = (r['League']       || '').toString().trim();
    const mode   = (r['Game Mode']    || '').toString().trim();
    const name   = (r['Comp Name']    || '').toString().trim();
    const start  = parseDate(r['Start Date']);
    const end    = parseDate(r['End Date']);
    const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      .map((d,i) => (r[d]||'').toString().toLowerCase() === 'yes' ? i : -1)
      .filter(d => d >= 0);
    const tStart = r['Session Start'] !== undefined ? String(r['Session Start']) : '';
    const tEnd   = r['Session End']   !== undefined ? String(r['Session End'])   : '';
    if (!league || !start || !end || days.length === 0) continue;
    result.push({ league, mode, name, start, end, days, tStart, tEnd });
  }
  return result;
}

function parseDate(s) {
  if (!s) return null;
  s = s.toString().trim();

  // Google Sheets ISO format: "2026-03-14T07:00:00.000Z"
  if (s.includes('T')) {
    const iso = new Date(s);
    if (!isNaN(iso)) {
      // Use UTC date parts to avoid timezone shift
      return new Date(iso.getUTCFullYear(), iso.getUTCMonth(), iso.getUTCDate());
    }
  }

  // MM/DD/YYYY
  const parts = s.replace(/"/g,'').split('/');
  if (parts.length === 3) {
    const [m,d,y] = parts.map(Number);
    if (!isNaN(m)&&!isNaN(d)&&!isNaN(y)) return new Date(y,m-1,d);
  }

  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function parseTime(s) {
  if (s === null || s === undefined || s === '') return null;
  s = s.toString().trim();

  // Google Sheets stores times as ISO on 1899-12-31
  // Offset of +960 mins converts stored UTC value to correct local time
  if (s.includes('T')) {
    const iso = new Date(s);
    if (!isNaN(iso)) {
      const utcMins = iso.getUTCHours() * 60 + iso.getUTCMinutes();
      return (utcMins + 960) % 1440;
    }
  }

  // "7:00 PM" or "7:00:00 PM"
  const ampm = s.match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)/i);
  if (ampm) {
    let h = parseInt(ampm[1]), mn = parseInt(ampm[2]);
    const ap = ampm[3].toUpperCase();
    if (ap==='PM' && h!==12) h+=12;
    if (ap==='AM' && h===12) h=0;
    return h*60+mn;
  }

  // "19:00" 24-hour
  const mil = s.match(/^(\d{1,2}):(\d{2})$/);
  if (mil) return parseInt(mil[1])*60 + parseInt(mil[2]);

  // Decimal fraction of day (0.791666 = 19:00)
  const num = parseFloat(s);
  if (!isNaN(num) && num >= 0 && num < 1) return Math.round(num * 24 * 60);

  return null;
}

function fmtTimeFromMins(mins) {
  if (mins === null) return '';
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  const ap = h < 12 ? 'AM' : 'PM';
  const hd = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${hd}:${m === 0 ? '00' : '30'} ${ap}`;
}

function fmtSlotLabel(h, m) {
  const ap = h<12?'AM':'PM', hd=h===0?12:h>12?h-12:h;
  return `${hd}:${m===0?'00':'30'} ${ap}`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function getEventsForDate(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  const dow = dt.getDay();
  return comps.filter(c => {
    if (!activeFilters.has(c.league)) return false;
    const s=new Date(c.start); s.setHours(0,0,0,0);
    const e=new Date(c.end);   e.setHours(0,0,0,0);
    return dt>=s && dt<=e && c.days.includes(dow);
  });
}

function timesOverlap(a,b) {
  const aS=parseTime(a.tStart), aE=parseTime(a.tEnd)||((aS||0)+120);
  const bS=parseTime(b.tStart), bE=parseTime(b.tEnd)||((bS||0)+120);
  if(aS===null||bS===null) return true;
  return aS<bE && bS<aE;
}

function detectOverlaps(year, month) {
  const conflicts=[];
  const dim=new Date(year,month+1,0).getDate();
  for(let d=1;d<=dim;d++) {
    const evts=getEventsForDate(new Date(year,month,d));
    for(let i=0;i<evts.length;i++)
      for(let j=i+1;j<evts.length;j++)
        if(timesOverlap(evts[i],evts[j]))
          conflicts.push({d,a:evts[i],b:evts[j]});
  }
  return conflicts;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCalendar() {
  const y=calDate.getFullYear(), m=calDate.getMonth();
  if      (calView==='month') { document.getElementById('cal-title').textContent=`${MONTHS[m]} ${y}`; renderMonth(y,m); }
  else if (calView==='week')  renderWeek(calDate);
  else                        renderDay(calDate);

  // Overlaps (month only)
  if (calView==='month') {
    const overlaps=detectOverlaps(y,m);
    const banner=document.getElementById('overlap-banner');
    if(overlaps.length>0 && comps.length>0) {
      const msgs=[...new Set(overlaps.map(o=>`${MONTHS_S[m]} ${o.d}: ${o.a.league} vs ${o.b.league}`))];
      document.getElementById('overlap-text').textContent=msgs.slice(0,8).join('  ·  ')+(msgs.length>8?`  +${msgs.length-8} more`:'');
      banner.classList.add('visible');
    } else banner.classList.remove('visible');
  } else document.getElementById('overlap-banner').classList.remove('visible');
}

function renderMonth(year,month) {
  const today=new Date(); today.setHours(0,0,0,0);
  const firstDay=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  const prevDim=new Date(year,month,0).getDate();
  let total=firstDay+dim; total=total<=35?35:42;
  if(comps.length===0) {
    document.getElementById('month-cells').innerHTML=`<div class="state-box" style="grid-column:1/-1"><div style="font-size:36px;margin-bottom:12px">&#128225;</div>Connecting to schedule data...</div>`;
    return;
  }
  let html='';
  for(let i=0;i<total;i++) {
    let day,cm=month,cy=year,other=false;
    if(i<firstDay){day=prevDim-firstDay+i+1;cm=month-1;if(cm<0){cm=11;cy--;}other=true;}
    else if(i>=firstDay+dim){day=i-firstDay-dim+1;cm=month+1;if(cm>11){cm=0;cy++;}other=true;}
    else day=i-firstDay+1;
    const dt=new Date(cy,cm,day);
    const isToday=dt.getTime()===today.getTime();
    const evts=other?[]:getEventsForDate(dt);
    let hasConflict=false;
    if(evts.length>1){
      outer:for(let a=0;a<evts.length;a++)
        for(let b=a+1;b<evts.length;b++)
          if(timesOverlap(evts[a],evts[b])){hasConflict=true;break outer;}
    }
    const chips=evts.slice(0,4).map(e=>`<div class="event-chip" style="background:${LEAGUE_COLORS[e.league]||'#888'}" title="${e.league} · ${e.mode}${e.tStart?' '+e.tStart:''}${e.name?' — '+e.name:''}"><span>${e.league}</span><span style="opacity:.65;font-weight:400"> · ${e.mode}</span></div>`).join('');
    const more=evts.length>4?`<div style="font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;padding-left:2px">+${evts.length-4} more</div>`:'';
    html+=`<div class="day-cell${other?' other-month':''}${isToday?' today':''}" onclick="goToDay(${cy},${cm},${day})">${hasConflict?'<div class="conflict-dot" title="Scheduling Conflict!">!</div>':''}<div class="day-num">${day}</div>${chips}${more}</div>`;
  }
  document.getElementById('month-cells').innerHTML=html;
}

function goToDay(y,m,d) {
  calDate=new Date(y,m,d);
  setView('day');
}

function renderWeek(ref) {
  const today=new Date(); today.setHours(0,0,0,0);
  const sun=new Date(ref); sun.setDate(ref.getDate()-ref.getDay());
  const weekDates=Array.from({length:7},(_,i)=>{ const d=new Date(sun); d.setDate(sun.getDate()+i); return d; });
  const sm=MONTHS_S[weekDates[0].getMonth()], em=MONTHS_S[weekDates[6].getMonth()], yr=weekDates[0].getFullYear();
  document.getElementById('cal-title').textContent=sm===em?`${sm} ${weekDates[0].getDate()}–${weekDates[6].getDate()}, ${yr}`:`${sm} ${weekDates[0].getDate()} – ${em} ${weekDates[6].getDate()}, ${yr}`;
  let hHtml='<th class="time-col">Time</th>';
  weekDates.forEach(d=>{ const isT=d.getTime()===today.getTime(); hHtml+=`<th${isT?' class="today-col"':''}>${DAYS_S[d.getDay()]} ${MONTHS_S[d.getMonth()]} ${d.getDate()}</th>`; });
  document.getElementById('week-header').innerHTML=hHtml;
  let bHtml='';
  for(let h=0;h<24;h++) {
    for(let m=0;m<60;m+=30) {
      const isHalf=m===30;
      const slotMins=h*60+m;
      const label=isHalf?`<span style="font-size:9px;opacity:.5">${fmtSlotLabel(h,m)}</span>`:fmtSlotLabel(h,m);
      bHtml+=`<tr class="${isHalf?'half-hour':''}"><td class="time-col">${label}</td>`;
      weekDates.forEach(d=>{
        const allEvts=getEventsForDate(new Date(d));
        const activeEvts=allEvts.filter(e=>{
          const tS=parseTime(e.tStart);
          let tE=parseTime(e.tEnd);
          if(tS===null) return false;
          if(tE===null||tE<=tS) tE=tS+60;
          return slotMins>=tS && slotMins<tE;
        });
        const startEvts=allEvts.filter(e=>parseTime(e.tStart)===slotMins);
        let cellStyle='';
        if(activeEvts.length===1){
          const c=LEAGUE_COLORS[activeEvts[0].league]||'#888';
          cellStyle=`background:${c}18;border-left:3px solid ${c};padding:2px 4px;`;
        } else if(activeEvts.length>1){
          cellStyle=`background:rgba(255,180,0,.15);border-left:3px solid #e6a800;padding:2px 4px;`;
        }
        const chips=startEvts.map(e=>{
          const c=LEAGUE_COLORS[e.league]||'#888';
          const endMins=parseTime(e.tEnd);
          const endLabel=endMins!==null?` → ${fmtSlotLabel(Math.floor(endMins/60),endMins%60)}`:'';
          return `<div class="event-chip" style="background:${c};font-size:10px;white-space:nowrap">${e.league} · ${e.mode}${endLabel}</div>`;
        }).join('');
        bHtml+=`<td style="${cellStyle}">${chips}</td>`;
      });
      bHtml+='</tr>';
    }
  }
  document.getElementById('week-body').innerHTML=bHtml;
}

function renderDay(ref) {
  const today=new Date(); today.setHours(0,0,0,0);
  const isToday=ref.getTime()===today.getTime();
  document.getElementById('cal-title').textContent=`${DAYS_L[ref.getDay()]}, ${MONTHS_S[ref.getMonth()]} ${ref.getDate()}, ${ref.getFullYear()}`;
  document.getElementById('day-header').innerHTML=`<th class="time-col">Time</th><th${isToday?' class="today-col"':''}>Schedule</th>`;
  const events=getEventsForDate(new Date(ref));
  let bHtml='', hasAny=false;
  for(let h=0;h<24;h++) {
    for(let m2=0;m2<60;m2+=30) {
      const slotMins=h*60+m2;
      const activeEvts=events.filter(e=>{
        const tS=parseTime(e.tStart);
        let tE=parseTime(e.tEnd);
        if(tS===null) return false;
        if(tE===null||tE<=tS) tE=tS+60;
        return slotMins>=tS && slotMins<tE;
      });
      const startEvts=events.filter(e=>parseTime(e.tStart)===slotMins);
      if(activeEvts.length===0 && !hasAny && h<11) continue;
      if(activeEvts.length>0) hasAny=true;
      const isHalf=m2===30;
      const label=isHalf?`<span style="font-size:9px;opacity:.5">${fmtSlotLabel(h,m2)}</span>`:fmtSlotLabel(h,m2);
      let cellStyle='';
      if(activeEvts.length===1){
        const c=LEAGUE_COLORS[activeEvts[0].league]||'#888';
        cellStyle=`background:${c}18;border-left:4px solid ${c};`;
      } else if(activeEvts.length>1){
        cellStyle=`background:rgba(255,180,0,.12);border-left:4px solid #e6a800;`;
      }
      const chips=startEvts.map(e=>{
        const c=LEAGUE_COLORS[e.league]||'#888';
        const endMins=parseTime(e.tEnd);
        const endLabel=endMins!==null?` → ${fmtSlotLabel(Math.floor(endMins/60),endMins%60)}`:'';
        return `<div class="event-chip" style="background:${c};padding:7px 12px;font-size:12px;margin-bottom:4px"><span style="font-size:13px">${e.league}</span><span style="opacity:.8;font-weight:400"> · ${e.mode}${e.name?' — '+e.name:''}${endLabel}</span></div>`;
      }).join('');
      bHtml+=`<tr class="${isHalf?'half-hour':''}"><td class="time-col">${label}</td><td style="${cellStyle}">${chips}</td></tr>`;
    }
  }
  if(!hasAny) bHtml=`<tr><td></td><td style="padding:50px;text-align:center;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:13px">No comps scheduled for this day</td></tr>`;
  document.getElementById('day-body').innerHTML=bHtml;
}

function navCal(dir) {
  if      (calView==='month') calDate.setMonth(calDate.getMonth()+dir);
  else if (calView==='week')  calDate.setDate(calDate.getDate()+dir*7);
  else                        calDate.setDate(calDate.getDate()+dir);
  renderCalendar();
}

function setView(v) {
  calView=v;
  document.getElementById('month-view').className='month-grid'+(v==='month'?' visible':'');
  document.getElementById('week-view').className ='week-grid' +(v==='week' ?' visible':'');
  document.getElementById('day-view').className  ='day-grid'  +(v==='day'  ?' visible':'');
  document.getElementById('btn-month').className ='view-btn'  +(v==='month'?' active':'');
  document.getElementById('btn-week').className  ='view-btn'  +(v==='week' ?' active':'');
  document.getElementById('btn-day').className   ='view-btn'  +(v==='day'  ?' active':'');
  renderCalendar();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function toggleFilter(league) {
  if(league==='ALL') {
    if(activeFilters.size===6) activeFilters.clear();
    else activeFilters=new Set(['ARC','CAL','CL','CClass','FFC','GenX']);
  } else {
    if(activeFilters.has(league)) activeFilters.delete(league);
    else activeFilters.add(league);
  }
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    const l=btn.textContent.trim();
    if(l==='All Leagues') btn.classList.toggle('on',activeFilters.size===6);
    else btn.classList.toggle('on',activeFilters.has(l));
  });
  renderCalendar();
}

function setStatus(state,msg) {
  const el=document.getElementById('status-pill');
  el.className='status-pill '+state;
  el.textContent=msg;
}

// ── Bonus: click a month day to jump to day view ──────────────────────────────

fetchData();
refreshTimer=setInterval(fetchData, 5*60*1000);
